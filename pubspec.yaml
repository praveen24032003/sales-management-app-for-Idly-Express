name: idly_express
description: "Idly Express - Sales & Profit Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  # State Management
  provider: ^6.1.1
  # Charts
  fl_chart: ^1.1.1
  # Export/Import
  share_plus: ^12.0.1
  file_picker: ^10.3.8
  # Formatting
  intl: ^0.20.2
  # File storage
  path_provider: ^2.1.1
  # Connectivity
  connectivity_plus: ^5.0.2
  internet_connection_checker: ^1.0.0+1
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  # Calling
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
